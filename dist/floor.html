<!DOCTYPE html>
<html lang="ru">
  <head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Выбор этажа</title>
  <link rel="shortcut icon" href="img/favicon.png" type="image/png">
  <!-- Link Swiper's CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css?_v=20260709185450" />
  <!-- intl-tel-input -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25/build/css/intlTelInput.css?_v=20260709185450" />
  <link rel="stylesheet" href="css/style.css?_v=20260709185450" />
</head>

  <body class="floor-page">
    <main>
      <section class="floor" data-floor>
        <!-- Сцена: отдельный фон + слой фасада поверх -->
        <div class="floor__scene">
          <!-- Фон (окружение/небо)-->
          <img class="floor__bg" src="img/floor-bg.png" alt="">
          <span class="floor__overlay"></span>

          <!-- Контейнер здания с фиксированными пропорциями (aspect-ratio под PNG).
          Внутри — PNG фасада БЕЗ фона. Полосы этажей делятся поровну (flex),поэтому нужен ФРОНТАЛЬНЫЙ фасад без перспективы-->
          <div class="floor__building">
            <img class="floor__building-img" src="img/urpaq-building.png" alt="ЖК LONDON">
            <!-- data-floors — сколько этажей (делим на столько равных полос);
            data-free — сколько квартир в продаже по этажам;
            data-heights — карта «этаж → % высоты» для этажей со своей высотой
            (напр. верхний мансардный выше остальных); остальные делят остаток;
            data-base — необязательная нижняя полоса «цоколь / паркинг».
            Если атрибута нет — полоса не показывается. Поля:
            label — подпись (напр. «Паркинг / Коммерция»), caption — заголовок
            в тултипе, height — процент высоты фасада под полосу.
            Продаж у неё нет — только пометка типа. -->
            <div class="floor__floors" data-floor-floors data-floors="6" data-start="2"
            data-free='{"7":5,"6":0,"5":3,"4":4,"3":2,"2":1}'
            data-heights='{"7":34}'
            data-base='{"label":"Коммерция","caption":"Уровень","height":20}'></div>
          </div>

          <!-- Плавающая карточка выбранного этажа -->
          <a class="floor__tooltip" href="plan.html" data-floor-tooltip>
            <div class="floor__tooltip-row">
              <div class="floor__tooltip-label text-s" data-floor-tooltip-caption>Этаж</div>
              <div class="floor__tooltip-value" data-floor-tooltip-num>0</div>
            </div>
            <span class="floor__tooltip-divider" data-floor-tooltip-divider></span>
            <div class="floor__tooltip-row" data-floor-tooltip-sale>
              <div class="floor__tooltip-label text-s">В продаже</div>
              <div class="floor__tooltip-value" data-floor-tooltip-available>0</div>
            </div>
          </a>
        </div>

        <!-- Мобильный выбор этажа: верхний таб-бар (табы заполняются из JS) -->
        <div class="floor__tabs" data-floor-tabs>
          <div class="floor__tabs-title">Этажи</div>
          <div class="floor__tabs-bar">
            <button class="floor__tabs-arrow" type="button" data-floor-tabs-prev aria-label="Предыдущий этаж">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 7L9 12L14 17" stroke="#1D1B20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="floor__tabs-list" data-floor-tabs-list></div>
            <button class="floor__tabs-arrow" type="button" data-floor-tabs-next aria-label="Следующий этаж">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 7L15 12L10 17" stroke="#1D1B20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Верхняя панель -->
        <a href="projects-inner.html" class="floor__back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 7L9 12L14 17L14 7Z" fill="#1D1B20"/>
          </svg>
          <span>ЖК LONDON</span>
        </a>

        <button class="floor__theme" type="button" data-floor-theme>
          <span class="floor__theme-label" data-floor-theme-label>день</span>
          <span class="floor__theme-knob">
            <svg class="floor__theme-moon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" rx="12" fill="#1405E2"/>
              <path d="M12.5625 17.75C11.6875 17.75 10.8672 17.5833 10.1016 17.25C9.33594 16.9167 8.66927 16.4661 8.10156 15.8984C7.53385 15.3307 7.08333 14.6641 6.75 13.8984C6.41667 13.1328 6.25 12.3125 6.25 11.4375C6.25 9.91667 6.73438 8.57552 7.70312 7.41406C8.67188 6.2526 9.90625 5.53125 11.4062 5.25C11.2188 6.28125 11.276 7.28906 11.5781 8.27344C11.8802 9.25781 12.401 10.1198 13.1406 10.8594C13.8802 11.599 14.7422 12.1198 15.7266 12.4219C16.7109 12.724 17.7188 12.7812 18.75 12.5938C18.4792 14.0938 17.7604 15.3281 16.5938 16.2969C15.4271 17.2656 14.0833 17.75 12.5625 17.75ZM12.5625 16.5C13.4792 16.5 14.3281 16.2708 15.1094 15.8125C15.8906 15.3542 16.5052 14.724 16.9531 13.9219C16.0573 13.8385 15.2083 13.612 14.4062 13.2422C13.6042 12.8724 12.8854 12.3698 12.25 11.7344C11.6146 11.099 11.1094 10.3802 10.7344 9.57812C10.3594 8.77604 10.1354 7.92708 10.0625 7.03125C9.26042 7.47917 8.63281 8.09635 8.17969 8.88281C7.72656 9.66927 7.5 10.5208 7.5 11.4375C7.5 12.8438 7.99219 14.0391 8.97656 15.0234C9.96094 16.0078 11.1562 16.5 12.5625 16.5Z" fill="white"/>
            </svg>
            <svg class="floor__theme-sun" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" rx="12" fill="#FFD10C"/>
              <g clip-path="url(#floorSunClip)">
                <path d="M11.4163 7.33337V5.58337H12.583V7.33337H11.4163ZM11.4163 18.4167V16.6667H12.583V18.4167H11.4163ZM16.6663 12.5834V11.4167H18.4163V12.5834H16.6663ZM5.58301 12.5834V11.4167H7.33301V12.5834H5.58301ZM15.908 8.90837L15.0913 8.09171L16.1122 7.04171L16.958 7.88754L15.908 8.90837ZM7.88717 16.9584L7.04134 16.1125L8.09134 15.0917L8.90801 15.9084L7.88717 16.9584ZM16.1122 16.9584L15.0913 15.9084L15.908 15.0917L16.958 16.1125L16.1122 16.9584ZM8.09134 8.90837L7.04134 7.88754L7.88717 7.04171L8.90801 8.09171L8.09134 8.90837ZM9.52051 14.4792C8.83995 13.7987 8.49967 12.9723 8.49967 12C8.49967 11.0278 8.83995 10.2014 9.52051 9.52087C10.2011 8.84032 11.0275 8.50004 11.9997 8.50004C12.9719 8.50004 13.7983 8.84032 14.4788 9.52087C15.1594 10.2014 15.4997 11.0278 15.4997 12C15.4997 12.9723 15.1594 13.7987 14.4788 14.4792C13.7983 15.1598 12.9719 15.5 11.9997 15.5C11.0275 15.5 10.2011 15.1598 9.52051 14.4792ZM13.6549 13.6552C14.107 13.2032 14.333 12.6514 14.333 12C14.333 11.3487 14.107 10.7969 13.6549 10.3448C13.2028 9.89275 12.6511 9.66671 11.9997 9.66671C11.3483 9.66671 10.7965 9.89275 10.3445 10.3448C9.89238 10.7969 9.66634 11.3487 9.66634 12C9.66634 12.6514 9.89238 13.2032 10.3445 13.6552C10.7965 14.1073 11.3483 14.3334 11.9997 14.3334C12.6511 14.3334 13.2028 14.1073 13.6549 13.6552Z" fill="white"/>
              </g>
              <defs>
                <clipPath id="floorSunClip"><rect width="14" height="14" fill="white" transform="translate(5 5)"/></clipPath>
              </defs>
            </svg>
          </span>
        </button>

        <!-- Карточка параметров объекта (на мобилке — выдвижная плашка снизу) -->
        <div class="floor__info" data-floor-info>
          <span class="floor__info-handle" data-floor-info-handle></span>
          <div class="floor__info-item">
            <div class="floor__info-label text-s">Класс объекта</div>
            <div class="floor__info-value">Бизнес-плюс</div>
          </div>
          <div class="floor__info-item">
            <div class="floor__info-label text-s">Срок сдачи</div>
            <div class="floor__info-value">1 этап строительства</div>
            <div class="floor__info-value">II квартал 2027</div>
            <div class="floor__info-value">2 этап строительства</div>
            <div class="floor__info-value">IV квартал 2028</div>
          </div>
          <div class="floor__info-item">
            <div class="floor__info-label text-s">Форматы помещений</div>
            <div class="floor__info-value">Квартиры и коммерческие помещения</div>
          </div>
          <div class="floor__info-item">
            <div class="floor__info-label text-s">Этаж</div>
            <div class="floor__info-value">16-18</div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/lenis@1.3.15/dist/lenis.min.js?_v=20260709185450"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js?_v=20260709185450"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js?_v=20260709185450"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js?_v=20260709185450"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25/build/js/intlTelInput.min.js?_v=20260709185450"></script>
<script src="js/app.js?_v=20260709185450"></script>
  </body>
</html>
