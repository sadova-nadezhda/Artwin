<!DOCTYPE html>
<html lang="ru">
  <head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход</title>
  <link rel="shortcut icon" href="img/favicon.png" type="image/png">
  <!-- Link Swiper's CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css?_v=20260713171257" />
  <!-- intl-tel-input -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@25/build/css/intlTelInput.css?_v=20260713171257" />
  <link rel="stylesheet" href="css/style.css?_v=20260713171257" />
</head>

  <body>
    <main>
      <section class="login section-hidden">
        <img class="login__bg" src="img/login-bg.png" alt="">
        <div class="login__card">
          <form class="auth" data-auth novalidate>

            <!-- Шаг 1 — номер телефона -->
            <div class="auth__step is-active" data-step="phone">
              <div class="auth__head">
                <h1 class="auth__title">Войти по номеру телефона</h1>
                <p class="auth__subtitle">Введите номер телефона. Мы отправим SMS-код для входа или создания аккаунта.</p>
              </div>

              <div class="auth__field">
                <span class="auth__field-label">Телефон*</span>
                <input class="auth__phone-input" type="tel" inputmode="tel" name="phone" data-auth-phone required>
              </div>

              <button class="auth__submit button button-primary" type="button" data-action="send" disabled>Получить код</button>
              <a href="index.html" class="auth__back">Назад</a>
            </div>

            <!-- Шаг 2 — код из SMS -->
            <div class="auth__step" data-step="code">
              <div class="auth__head">
                <h1 class="auth__title">Введите код из SMS</h1>
                <p class="auth__subtitle">
                  <span>Мы отправили код на номер </span>
                  <b data-auth-phone-label></b></p>
              </div>

              <label class="auth__field">
                <span class="auth__field-label">Код из СMS*</span>
                <input class="auth__input" type="text" inputmode="numeric" name="code" placeholder="Пример: 001100" maxlength="6" autocomplete="one-time-code" data-auth-code required>
              </label>

              <div class="auth__resend">
                <span data-auth-timer>Отправить код повторно через: 30</span>
                <button class="auth__resend-btn" type="button" data-action="resend" hidden>Отправить код повторно</button>
              </div>

              <button class="auth__submit button button-primary" type="submit" data-auth-verify disabled>Отправить</button>
              <button class="auth__back" type="button" data-action="back">Назад</button>
            </div>

          </form>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/lenis@1.3.15/dist/lenis.min.js?_v=20260713171257"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js?_v=20260713171257"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js?_v=20260713171257"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js?_v=20260713171257"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@25/build/js/intlTelInput.min.js?_v=20260713171257"></script>
<script src="js/app.js?_v=20260713171257"></script>
  </body>
</html>
