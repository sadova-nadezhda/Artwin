<!DOCTYPE html>
<html lang="ru">
  @@include('html/head.html', { "title": "Просмотр планировки" })
  <body class="plan-page">
    <main>
      <!-- data-floors — сколько этажей в табах; data-active — активный по умолчанию -->
      <section class="plan" data-plan data-floors="9" data-active="9">
        <!-- ===== Левая карточка: инфо по выбранной квартире ===== -->
        <aside class="plan__aside">
          <a href="floor.html" class="plan__back">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" rx="6" transform="matrix(-4.37114e-08 1 1 4.37114e-08 1.04907e-06 0)" fill="#F5F5F5"/>
              <path d="M12.75 8.25L9 12L12.75 15.75L12.75 8.25Z" fill="#1D1B20"/>
            </svg>
            <span>Вернуться назад</span>
          </a>

          <h1 class="plan__title">ЖК LONDON</h1>
          <div class="plan__unit-name" data-plan-name>Квартира&nbsp;#1</div>

          <div class="plan__fields">
            <div class="plan__field">
              <span class="plan__field-label">Блок</span>
              <span class="plan__field-value" data-plan-block>1</span>
            </div>
            <div class="plan__field">
              <span class="plan__field-label">Этаж</span>
              <span class="plan__field-value" data-plan-floor>9</span>
            </div>
            <div class="plan__field">
              <span class="plan__field-label">Комнатность</span>
              <span class="plan__field-value" data-plan-rooms>1</span>
            </div>
            <div class="plan__field">
              <span class="plan__field-label">Площадь</span>
              <span class="plan__field-value" data-plan-area>54 м2</span>
            </div>
            <div class="plan__field">
              <span class="plan__field-label">Цена</span>
              <span class="plan__field-value" data-plan-price>От 2 833 380</span>
            </div>
            <div class="plan__field">
              <span class="plan__field-label">Статус</span>
              <span class="plan__field-value" data-plan-status>На стадии строительства</span>
            </div>
          </div>

          <a class="plan__submit button button-primary">Оставить заявку</a>
          <a href="#" class="plan__pdf button button-light" target="_blank">Скачать PDF</a>
        </aside>

        <!-- ===== Правая часть: табы этажей + план ===== -->
        <div class="plan__main">
          <div class="plan__tabs">
            <div class="plan__tabs-title">Этажи</div>
            <div class="plan__tabs-bar">
              <button class="plan__tabs-arrow" type="button" data-plan-prev aria-label="Ниже этажом">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M14 7L9 12L14 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div class="plan__tabs-list" data-plan-tabs></div>
              <button class="plan__tabs-arrow" type="button" data-plan-next aria-label="Выше этажом">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M10 7L15 12L10 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="plan__canvas">
            <!-- OVERLAY: PNG-подложка + прозрачный SVG с контурами квартир.
            Каждая квартира — [data-plan-unit] c data-*
            полями (наводкой заполняют левую карточку); path — контур заливки.
            data-* значения примерные — проставьте реальные по квартирам. -->
            <div class="plan__plan">
              <img class="plan__plan-img" src="@img/plan.png" alt="Планировка этажа">
              <svg class="plan__svg" viewBox="0 0 832 356" preserveAspectRatio="none"
                   fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Планировка этажа">
                <g class="plan__unit" data-plan-unit tabindex="0" role="button"
                   data-num="1" data-block="2" data-rooms="2" data-area="54.72 м2" data-price="От 2 833 380" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M460.5 285.5V267.5H504V174H536V318.5H534.5V333.5H533V335.5H463V285.5H460.5Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button" data-placeholder
                   data-num="2" data-block="2" data-rooms="1" data-area="16.98 м2" data-price="От 2 833 380" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M339 260.5V173.5H415.5V260.5H374H339Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button"
                   data-num="3" data-block="1" data-rooms="2" data-area="71.90 м2" data-price="От 3 720 000" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M245 39.5H132V119.5H250V122H266.5V83.5V51.5H250V55.5H242V47.5H245V39.5Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button"
                   data-num="4" data-block="1" data-rooms="3" data-area="107.2 м2" data-price="От 5 420 000" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M242 197H171V336H283.5V334H286V197.5H283V195.5H250V197H242Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button"
                   data-num="5" data-block="1" data-rooms="3" data-area="110.13 м2" data-price="От 5 560 000" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M19 47.5V39H125.5V191H65.5H18.5V121V55.5H22V47.5H19Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button"
                   data-num="6" data-block="1" data-rooms="4" data-area="131.20 м2" data-price="От 6 640 000" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M19 294V197H125.5V248.5H165V336H86.5H61L57.5 345.5L34 355.5L10.5 345.5L0 320L10.5 296.278L19 294Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button" data-placeholder
                   data-num="7" data-block="2" data-rooms="1" data-area="14.94 м2" data-price="От 2 833 380" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M301 189.5V173.5H333V267H377.5V285.5H375V336H338H301V198.5H303.5V189.5H301Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button" data-placeholder
                   data-num="8" data-block="2" data-rooms="1" data-area="16.08 м2" data-price="От 2 833 380" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M497.5 173.5H421.5L421 261H497.5V173.5Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button"
                   data-num="9" data-block="3" data-rooms="4" data-area="110.15 м2" data-price="От 5 560 000" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M551.5 335.5L550.5 165L557 159L625.5 223.5L654 195L666.5 207.5L664 210L688 234L691.5 231L702.5 241.5L608.5 335.5H592.5H551.5Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button"
                   data-num="10" data-block="3" data-rooms="2" data-area="46.86 м2" data-price="От 2 430 000" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M570.5 166.5L559.5 155.5L615 100L677 159.5L660 175.5L661 178L653.5 185.5L650.5 182.5L622 211.5L572.5 164.5L570.5 166.5Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button" data-placeholder
                   data-num="11" data-block="3" data-rooms="1" data-area="34.20 м2" data-price="От 2 833 380" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M674.5 41.5L620 95.5L679.5 154L682.5 151.5L685.5 154L688.5 150.5L708 132.5L705.5 130L735 100L674.5 41.5Z"/>
                </g>
                <g class="plan__unit" data-plan-unit tabindex="0" role="button"
                   data-num="12" data-block="3" data-rooms="3" data-area="74.04 м2" data-price="От 3 810 000" data-status="На стадии строительства">
                  <path class="plan__unit-shape" d="M716 0L679 37L737 94L738.5 93L748 101.5L716 133L730 146.5L733 143L736 145.5L756 166.5L752.5 169.5L764 180.5L830.5 113.5L716 0Z"/>
                </g>
              </svg>
            </div>
          </div>
        </div>
      </section>
    </main>

    @@include('html/foot.html')
  </body>
</html>
