<div class="lk-lang" data-lang>
  <button class="lk-lang__current" type="button" data-lang-toggle>
    <span class="lk-lang__flag">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect y="0" width="24" height="8" fill="#fff"/>
        <rect y="8" width="24" height="8" fill="#0039A6"/>
        <rect y="16" width="24" height="8" fill="#D52B1E"/>
      </svg>
    </span>
    <span class="lk-lang__name">RU</span>
    <svg class="lk-lang__arrow" width="16" height="16" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 2L8 6L4 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="lk-lang__drop">
    <button class="lk-lang__option is-active" type="button" data-lang-value="ru">
      <span class="lk-lang__flag">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect y="0" width="24" height="8" fill="#fff"/>
          <rect y="8" width="24" height="8" fill="#0039A6"/>
          <rect y="16" width="24" height="8" fill="#D52B1E"/>
        </svg>
      </span>
      <span class="lk-lang__name">RU</span>
      <svg class="lk-lang__opt-arrow" width="16" height="16" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 2L8 6L4 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="lk-lang__option" type="button" data-lang-value="ky">
      <span class="lk-lang__flag">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" fill="#E8112D"/>
          <circle cx="12" cy="12" r="4.5" fill="#FFEF00"/>
          <g stroke="#FFEF00" stroke-width="1.2" stroke-linecap="round">
            <path d="M12 3V5.5"/><path d="M12 18.5V21"/><path d="M3 12H5.5"/><path d="M18.5 12H21"/>
            <path d="M5.5 5.5L7.2 7.2"/><path d="M16.8 16.8L18.5 18.5"/><path d="M18.5 5.5L16.8 7.2"/><path d="M7.2 16.8L5.5 18.5"/>
          </g>
        </svg>
      </span>
      <span class="lk-lang__name">KG</span>
      <svg class="lk-lang__opt-arrow" width="16" height="16" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 2L8 6L4 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="lk-lang__option" type="button" data-lang-value="en">
      <span class="lk-lang__flag">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" fill="#012169"/>
          <path d="M0 0L24 24M24 0L0 24" stroke="#fff" stroke-width="4"/>
          <path d="M0 0L24 24M24 0L0 24" stroke="#C8102E" stroke-width="2"/>
          <path d="M12 0V24M0 12H24" stroke="#fff" stroke-width="6"/>
          <path d="M12 0V24M0 12H24" stroke="#C8102E" stroke-width="3.5"/>
        </svg>
      </span>
      <span class="lk-lang__name">EN</span>
      <svg class="lk-lang__opt-arrow" width="16" height="16" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 2L8 6L4 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>
